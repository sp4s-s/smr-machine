name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.0
      - name: Show toolchain
        run: |
          ocamlc -version
          dune --version
          clang++ --version
      - name: Build
        run: make all
      - name: Test
        run: make test
      - name: Integration
        run: make integration
      - name: Benchmark report
        run: make bench-report
